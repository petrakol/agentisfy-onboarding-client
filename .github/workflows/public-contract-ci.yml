name: public-contract-ci

on:
  pull_request:
  push:
    branches: ["main", "master", "work"]

jobs:
  fast-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  integration-gates:
    runs-on: ubuntu-latest
    needs: fast-gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: AGENTISFY_FORCE_DEMO_FALLBACK=true npm run test
